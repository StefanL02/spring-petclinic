---
- name: Configure EC2 and deploy PetClinic
  hosts: petclinic
  become: yes

  tasks:
    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu jammy stable
        state: present

    - name: Install Docker
      apt:
        name: docker-ce
        state: present
        update_cache: yes

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Pull PetClinic Docker image
      docker_image:
        name: "stefanl02/spring-petclinic:latest"
        source: pull

    - name: Stop existing PetClinic container
      docker_container:
        name: petclinic
        state: absent
      ignore_errors: yes

    - name: Run PetClinic container
      docker_container:
        name: petclinic
        image: "stefanl02/spring-petclinic:latest"
        state: started
        ports:
          - "8080:8080"
        restart_policy: always

    - name: Create Prometheus config directory
      file:
        path: /etc/prometheus
        state: directory

    - name: Get server IP
      shell: curl -s http://169.254.169.254/latest/meta-data/local-ipv4
      register: server_ip

    - name: Create Prometheus config file
      copy:
        dest: /etc/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'petclinic'
              metrics_path: '/actuator/prometheus'
              static_configs:
                - targets: ['{{ server_ip.stdout }}:8080']
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

    - name: Stop existing Prometheus container
      docker_container:
        name: prometheus
        state: absent
      ignore_errors: yes

    - name: Run Prometheus container
      docker_container:
        name: prometheus
        image: "prom/prometheus:latest"
        state: started
        ports:
          - "9090:9090"
        volumes:
          - "/etc/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"
        restart_policy: always

    - name: Stop existing Grafana container
      docker_container:
        name: grafana
        state: absent
      ignore_errors: yes

    - name: Run Grafana container
      docker_container:
        name: grafana
        image: "grafana/grafana:latest"
        state: started
        ports:
          - "3000:3000"
        restart_policy: always
